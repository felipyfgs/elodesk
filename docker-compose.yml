services:
  postgres:
    image: postgres:16
    container_name: elodesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wzap
      POSTGRES_PASSWORD: wzap
      POSTGRES_DB: wzap
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wzap"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: elodesk-redis
    restart: unless-stopped
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: elodesk-minio
    restart: unless-stopped
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000"
    ports:
      - "${MINIO_BIND_ADDR:-0.0.0.0}:${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_BIND_ADDR:-0.0.0.0}:${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: elodesk-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_gomod:/go/pkg/mod
      - backend_gocache:/root/.cache/go-build
      - /app/tmp
    environment:
      PORT: "3001"
      SERVER_HOST: "0.0.0.0"
      GO_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgres://wzap:wzap@postgres:5432/wzap?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      BACKEND_KEK: ${BACKEND_KEK:-ZGV2LWtlay1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtMzI=}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: backend-media
      MINIO_PUBLIC_ENDPOINT: 127.0.0.1
      MINIO_PUBLIC_PORT: "9010"
      MINIO_PUBLIC_USE_SSL: "false"
      # API_URL é a URL pública do elodesk usada pra montar links de mídia
      # em webhooks outbound (padrão Chatwoot/ActiveStorage — o elodesk hospeda
      # a URL e proxia bytes do MinIO). Precisa ser alcançável de containers
      # externos (wzap, n8n) — `host.docker.internal` resolve via host-gateway.
      API_URL: http://host.docker.internal:3001
      CORS_ORIGINS: "*"
      META_ALLOW_UNSIGNED: "true"
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:-dev-stub}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-dev-stub}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: elodesk-worker
    restart: unless-stopped
    command: ["air", "-c", ".air.worker.toml"]
    volumes:
      - ./backend:/app
      - backend_gomod:/go/pkg/mod
      - backend_gocache:/root/.cache/go-build
      - /app/tmp
    environment:
      GO_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgres://wzap:wzap@postgres:5432/wzap?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      BACKEND_KEK: ${BACKEND_KEK:-ZGV2LWtlay1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtMzI=}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: elodesk-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NUXT_PUBLIC_WS_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_gomod:
  backend_gocache:
