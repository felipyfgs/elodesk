name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: backend_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Go test
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/backend_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-must-be-at-least-32-chars-long
          BACKEND_KEK: dGVzdC1rZXktbXVzdC1iZS1iYXNlNjQtZW5jb2RlZA==
          GO_ENV: test
        run: go test -race ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: v1.62

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Test
        working-directory: frontend
        run: pnpm test

  widget:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Install
        working-directory: widget
        run: npm ci

      - name: Build
        working-directory: widget
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: widget-bundle
          path: widget/dist/
          retention-days: 30

  publish-widget:
    needs: [backend, frontend, widget]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Install
        working-directory: widget
        run: npm ci

      - name: Build
        working-directory: widget
        run: npm run build

      - name: Publish to CDN
        working-directory: widget
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CDN_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_AWS_SECRET_ACCESS_KEY }}
          CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
          CDN_PREFIX: ${{ secrets.CDN_PREFIX }}
        run: |
          aws s3 cp dist/widget.js s3://$CDN_BUCKET/widget.js --cache-control "public, max-age=31536000" --content-type "application/javascript"
          aws s3 cp dist/widget.css s3://$CDN_BUCKET/widget.css --cache-control "public, max-age=31536000" --content-type "text/css" || true
          aws cloudfront create-invalidation --distribution-id $CDN_PREFIX --paths "/widget.js" "/widget.css" || true
