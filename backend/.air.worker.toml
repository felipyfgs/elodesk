root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/worker"
  cmd = "go build -o ./tmp/worker ./cmd/worker/main.go"
  delay = 1000
  exclude_dir = ["tmp", "docs", "bin"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql"]
  kill_delay = "2s"
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
